<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>VibeWork — Сброс пароля</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&family=Roboto:wght@400;500&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-rgb: 34, 197, 94;
            --accent: #22c55e;
            --accent-dark: #166534;
            --accent-soft: rgba(var(--neon-rgb), 0.14);
            --accent-border: rgba(var(--neon-rgb), 0.42);
            --bg-page: #ffffff;
            --card: #ffffff;
            --text: #000000;
            --text-muted: #4a4a4a;
            --border: #dbdada;
            --danger: #ac3e46;
            --radius-lg: 22px;
            --radius-sm: 10px;
            --radius-cta: 40px;
            --shadow-card: 0 2px 20px -4px rgba(0, 0, 0, 0.06), 0 4px 24px rgba(0, 0, 0, 0.05);
            --font: "Open Sans", system-ui, sans-serif;
            --font-input: "Roboto", system-ui, sans-serif;
            --font-mono: "JetBrains Mono", ui-monospace, monospace;
            --btn-anketa-bg: #ecfdf5;
            --btn-anketa-bg-hover: #d1fae5;
            --btn-anketa-bg-selected: #d1fae5;
            --btn-anketa-border-strong: #22c55e;
            --btn-primary-border: #15803d;
        }
        * { box-sizing: border-box; }
        html { color-scheme: light; }
        html, body { margin: 0; min-height: 100%; }
        body {
            font-family: var(--font);
            background: var(--bg-page);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 100% 100%, rgba(var(--neon-rgb), 0.02), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px 48px;
        }
        .brand-mono {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text);
        }
        .tagline { font-size: .78rem; color: var(--text-muted); font-weight: 500; text-align: center; margin: 0 0 8px; }
        .auth-card {
            width: 100%;
            max-width: 420px;
            margin-top: 24px;
            padding: 24px 20px 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            background: var(--card);
        }
        h1 { margin: 0 0 10px; font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
        p.muted, .muted { color: var(--text-muted); font-size: .85rem; margin: 0 0 14px; }
        label { display: block; font-size: .82rem; font-weight: 600; margin: 12px 0 6px; color: var(--text); }
        input[type="email"], input[type="password"], input.pwd-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 7px;
            font-family: var(--font-input);
            font-size: 1rem;
        }
        input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }
        .pwd-reveal { display: flex; align-items: center; gap: 10px; margin: 0 0 14px; }
        .pwd-square {
            width: 26px; height: 26px;
            border: 2px solid var(--btn-anketa-border-strong);
            border-radius: 8px;
            background: var(--btn-anketa-bg);
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
        }
        .pwd-reveal-caption { font-size: .78rem; color: var(--text-muted); }
        button.btn-primary {
            width: 100%;
            padding: 12px 18px;
            margin-top: 8px;
            border: 2px solid var(--btn-anketa-border-strong);
            border-radius: var(--radius-cta);
            background: var(--btn-anketa-bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button.btn-primary:hover { background: var(--btn-anketa-bg-hover); }
        button.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        a.btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 16px;
            padding: 10px 16px;
            border-radius: var(--radius-cta);
            border: 2px solid var(--btn-anketa-border-strong);
            background: var(--btn-anketa-bg);
            color: var(--text);
            font-family: var(--font);
            font-size: .85rem;
            font-weight: 600;
            text-decoration: none;
        }
        a.btn-secondary:hover { background: var(--btn-anketa-bg-hover); }
        .msg { display: none; font-size: .85rem; margin-bottom: 12px; padding: 10px 12px; border-radius: var(--radius-sm); }
        .msg.err {
            display: block;
            color: var(--danger);
            background: #fff1f2;
            border: 1px solid #fecdd3;
        }
        .msg.ok {
            display: block;
            color: var(--accent-dark);
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
        }
        .hidden { display: none !important; }
        a.inline { color: var(--accent-dark); font-weight: 600; }
    </style>
</head>
<body>
    <div class="wrap">
        <div style="text-align:center"><span class="brand-mono">{ VibeWork }</span></div>
        <p class="tagline">Карьерный навигатор 14–30</p>

        <div class="auth-card" id="cardRequest">
            <h1>Сброс пароля</h1>
            <p class="muted">Укажите почту, с которой вы регистрировались. Мы отправим ссылку для нового пароля.</p>
            <div class="msg" id="msgRequest"></div>
            <label for="reqEmail">Email</label>
            <input type="email" id="reqEmail" autocomplete="email" placeholder="you@example.com">
            <button type="button" class="btn-primary" id="btnRequest">Отправить ссылку</button>
            <a class="btn-secondary" href="/" style="width:100%;box-sizing:border-box">← На страницу входа</a>
        </div>

        <div class="auth-card hidden" id="cardReset">
            <h1>Новый пароль</h1>
            <p class="muted">Придумайте пароль не короче 8 символов.</p>
            <div class="msg" id="msgReset"></div>
            <label for="newPass">Новый пароль</label>
            <input class="pwd-input" type="password" id="newPass" autocomplete="new-password" placeholder="Не меньше 8 символов">
            <div class="pwd-reveal">
                <button type="button" class="pwd-square" id="tog1" aria-label="Показать пароль">○</button>
                <span class="pwd-reveal-caption">Показать пароль</span>
            </div>
            <label for="newPass2">Пароль ещё раз</label>
            <input class="pwd-input" type="password" id="newPass2" autocomplete="new-password">
            <div class="pwd-reveal">
                <button type="button" class="pwd-square" id="tog2" aria-label="Показать пароль">○</button>
                <span class="pwd-reveal-caption">Показать пароль</span>
            </div>
            <button type="button" class="btn-primary" id="btnReset">Сохранить пароль</button>
            <a class="btn-secondary" href="/" style="width:100%;box-sizing:border-box">← На страницу входа</a>
        </div>
    </div>
    <script>
    (function () {
        function sanitizePasswordInput(s) {
            if (!s || typeof s !== 'string') return '';
            return s.replace(/\r/g, '').replace(/[\u200b-\u200d\ufeff]/g, '').replace(/^[\s\t\n\v\f]+|[\s\t\n\v\f]+$/g, '');
        }
        function isValidEmail(s) {
            if (!s || typeof s !== 'string') return false;
            var t = s.trim();
            if (t.length < 5 || t.length > 254 || /\s/.test(t)) return false;
            return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(t);
        }
        function showMsg(el, text, ok) {
            el.className = 'msg ' + (ok ? 'ok' : 'err');
            el.textContent = text;
        }
        function apiErrorDetail(data) {
            var d = data && data.detail;
            if (typeof d === 'string') return d;
            if (Array.isArray(d)) {
                var parts = [];
                for (var i = 0; i < d.length; i++) {
                    if (d[i] && typeof d[i].msg === 'string') parts.push(d[i].msg);
                }
                if (parts.length) return parts.join(' ');
            }
            return '';
        }
        function wireToggle(btnId, inpId) {
            var btn = document.getElementById(btnId);
            var inp = document.getElementById(inpId);
            if (!btn || !inp) return;
            btn.onclick = function () {
                var show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                btn.textContent = show ? '◉' : '○';
            };
            btn.textContent = inp.type === 'password' ? '○' : '◉';
        }

        var params = new URLSearchParams(window.location.search);
        var token = params.get('token');
        var cardReq = document.getElementById('cardRequest');
        var cardRes = document.getElementById('cardReset');

        if (token && token.length >= 10) {
            cardReq.classList.add('hidden');
            cardRes.classList.remove('hidden');
        }

        wireToggle('tog1', 'newPass');
        wireToggle('tog2', 'newPass2');

        document.getElementById('btnRequest').onclick = async function () {
            var msg = document.getElementById('msgRequest');
            msg.className = 'msg';
            msg.textContent = '';
            msg.style.display = '';
            var email = document.getElementById('reqEmail').value.trim();
            if (!email) {
                showMsg(msg, 'Укажите почту', false);
                return;
            }
            if (!isValidEmail(email)) {
                showMsg(msg, 'Введите корректный адрес почты', false);
                return;
            }
            var btn = document.getElementById('btnRequest');
            btn.disabled = true;
            try {
                var res = await fetch('/auth/email/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                var data = await res.json().catch(function () { return {}; });
                if (res.status === 429) {
                    showMsg(msg, apiErrorDetail(data) || 'Слишком часто. Подождите минуту.', false);
                    return;
                }
                if (!res.ok) {
                    var m = apiErrorDetail(data);
                    if (!m) {
                        m = res.status === 503
                            ? 'Сервер не смог отправить письмо (почта не настроена или сбой). Попробуйте позже.'
                            : 'Не удалось отправить. Попробуйте позже.';
                    }
                    showMsg(msg, m, false);
                    return;
                }
                showMsg(msg, data.message || 'Ссылка для сброса пароля отправлена.', true);
            } catch (e) {
                showMsg(msg, 'Нет связи с сервером', false);
            } finally {
                btn.disabled = false;
            }
        };

        document.getElementById('btnReset').onclick = async function () {
            var msg = document.getElementById('msgReset');
            msg.className = 'msg';
            msg.textContent = '';
            msg.style.display = '';
            var p1 = sanitizePasswordInput(document.getElementById('newPass').value);
            var p2 = sanitizePasswordInput(document.getElementById('newPass2').value);
            if (p1.length < 8) {
                showMsg(msg, 'Пароль — не короче 8 символов', false);
                return;
            }
            if (p1 !== p2) {
                showMsg(msg, 'Пароли не совпадают', false);
                return;
            }
            var btn = document.getElementById('btnReset');
            btn.disabled = true;
            try {
                var res = await fetch('/auth/email/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: p1 })
                });
                var data = await res.json().catch(function () { return {}; });
                if (!res.ok) {
                    var m = data.detail;
                    if (typeof m !== 'string') m = 'Не удалось сменить пароль';
                    showMsg(msg, m, false);
                    return;
                }
                showMsg(msg, 'Пароль обновлён. Теперь можно войти на главной странице.', true);
                document.getElementById('newPass').disabled = true;
                document.getElementById('newPass2').disabled = true;
                btn.style.display = 'none';
            } catch (e) {
                showMsg(msg, 'Нет связи с сервером', false);
            } finally {
                btn.disabled = false;
            }
        };
    })();
    </script>
</body>
</html>
