<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>VibeWork — Сброс пароля</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/static/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    (function () {
      try {
        if (localStorage.getItem("vibework_theme") === "dark") document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    })();
  </script>
</head>
<body class="auth-standalone auth-reset-page">
  <div id="auth-gate" class="auth-gate" role="main">
    <div class="auth-gate-waves" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" preserveAspectRatio="xMidYMid slice" fill="none">
        <g stroke="#22a954" stroke-width="1.15" stroke-linecap="round" opacity="0.38">
          <path d="M-80 300c200-48 400 48 600 0s400-48 600 0 400 48 600 0" />
          <path d="M-80 326c220 52 420-52 640 0s380 52 600 0 420-52 640 0" />
          <path d="M-80 352c180-40 380 40 560 0s420-40 600 0 420 40 600 0" />
          <path d="M-80 378c240 44 440-44 680 0s360 44 560 0 440-44 680 0" />
          <path d="M-80 404c160-36 360 36 520 0s440-36 600 0 440 36 600 0" />
          <path d="M-80 430c210 40 410-40 620 0s390 40 580 0 410-40 620 0" />
          <path d="M-80 456c190-44 390 44 580 0s410-44 590 0 410 44 590 0" />
          <path d="M-80 482c230 36 430-36 660 0s370 36 550 0 430-36 660 0" />
          <path d="M-80 508c170-32 370 32 540 0s430-32 600 0 430 32 600 0" />
          <path d="M-80 534c200 38 400-38 600 0s400 38 600 0 400-38 600 0" />
        </g>
      </svg>
    </div>
    <div class="auth-gate-card" id="cardRequest">
      <h1 class="auth-gate-title">Сброс пароля</h1>
      <p class="auth-gate-sub muted">Укажите почту, с которой вы регистрировались. Мы отправим ссылку для нового пароля. Письмо может попасть в «Спам».</p>
      <div class="reset-msg" id="msgRequest" role="status"></div>
      <label class="auth-reset-label" for="reqEmail">Email</label>
      <input type="email" id="reqEmail" class="auth-field auth-gate-field" autocomplete="email" placeholder="you@example.com" />
      <div class="auth-gate-actions auth-gate-actions--single auth-reset-actions">
        <button type="button" class="btn-auth-gate btn-auth-gate-primary" id="btnRequest">Отправить ссылку</button>
        <a class="btn-auth-gate btn-auth-gate-secondary auth-reset-back" id="backLoginRequest" href="/">← На страницу входа</a>
      </div>
      <p class="auth-gate-brand" aria-hidden="true">
        <span class="brand-lockup brand-lockup--gate" translate="no">
          <span class="brand-brace" aria-hidden="true">{</span><span class="brand-name">VibeWork</span><span class="brand-brace" aria-hidden="true">}</span>
        </span>
        <span class="auth-gate-brand-tag">карьерный навигатор</span>
      </p>
    </div>

    <div class="auth-gate-card hidden" id="cardReset">
      <h1 class="auth-gate-title">Новый пароль</h1>
      <p class="auth-gate-sub muted">Придумайте пароль не короче 8 символов.</p>
      <div class="reset-msg" id="msgReset" role="status"></div>
      <label class="auth-reset-label" for="newPass">Новый пароль</label>
      <input class="auth-field auth-gate-field" type="password" id="newPass" autocomplete="new-password" placeholder="Не меньше 8 символов" />
      <button type="button" class="auth-reset-show-pass" id="tog1" aria-label="Показать пароль">Показать пароль</button>
      <label class="auth-reset-label" for="newPass2">Пароль ещё раз</label>
      <input class="auth-field auth-gate-field" type="password" id="newPass2" autocomplete="new-password" />
      <button type="button" class="auth-reset-show-pass" id="tog2" aria-label="Показать пароль">Показать пароль</button>
      <div class="auth-gate-actions auth-gate-actions--single auth-reset-actions">
        <button type="button" class="btn-auth-gate btn-auth-gate-primary" id="btnReset">Сохранить пароль</button>
        <a class="btn-auth-gate btn-auth-gate-secondary auth-reset-back" id="backLoginReset" href="/">← На страницу входа</a>
      </div>
      <p class="auth-gate-brand" aria-hidden="true">
        <span class="brand-lockup brand-lockup--gate" translate="no">
          <span class="brand-brace" aria-hidden="true">{</span><span class="brand-name">VibeWork</span><span class="brand-brace" aria-hidden="true">}</span>
        </span>
        <span class="auth-gate-brand-tag">карьерный навигатор</span>
      </p>
    </div>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
  (function () {
    function isMiniappContext() {
      try {
        var p = new URLSearchParams(window.location.search);
        if (p.get("from") === "miniapp") return true;
      } catch (e) {}
      try {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (tg && tg.initData && String(tg.initData).length > 0) return true;
        if (document.documentElement.getAttribute("data-tg-webapp") === "1") return true;
      } catch (e2) {}
      try {
        var ref = document.referrer || "";
        if (ref.indexOf("/miniapp") >= 0) return true;
      } catch (e3) {}
      return false;
    }
    function loginBackHref() {
      return isMiniappContext() ? "/miniapp/?auth=login" : "/";
    }
    function wireBackLinks() {
      var href = loginBackHref();
      ["backLoginRequest", "backLoginReset"].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.setAttribute("href", href);
      });
    }
    wireBackLinks();
    function sanitizePasswordInput(s) {
      if (!s || typeof s !== "string") return "";
      return s.replace(/\r/g, "").replace(/[\u200b-\u200d\ufeff]/g, "").replace(/^[\s\t\n\v\f]+|[\s\t\n\v\f]+$/g, "");
    }
    function isValidEmail(s) {
      if (!s || typeof s !== "string") return false;
      var t = s.trim();
      if (t.length < 5 || t.length > 254 || /\s/.test(t)) return false;
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(t);
    }
    function showMsg(el, text, ok) {
      if (!el) return;
      if (!text) {
        el.className = "reset-msg";
        el.textContent = "";
        return;
      }
      el.className = "reset-msg " + (ok ? "reset-msg--ok" : "reset-msg--err");
      el.textContent = text;
    }
    function apiErrorDetail(data) {
      var d = data && data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d)) {
        var parts = [];
        for (var i = 0; i < d.length; i++) {
          if (d[i] && typeof d[i].msg === "string") parts.push(d[i].msg);
        }
        if (parts.length) return parts.join(" ");
      }
      return "";
    }
    function wireToggle(btnId, inpId) {
      var btn = document.getElementById(btnId);
      var inp = document.getElementById(inpId);
      if (!btn || !inp) return;
      btn.onclick = function () {
        var show = inp.type === "password";
        inp.type = show ? "text" : "password";
        btn.textContent = show ? "Скрыть пароль" : "Показать пароль";
        btn.setAttribute("aria-pressed", show ? "true" : "false");
      };
    }

    var params = new URLSearchParams(window.location.search);
    var token = params.get("token");
    var cardReq = document.getElementById("cardRequest");
    var cardRes = document.getElementById("cardReset");
    var prefillEmail = params.get("email");
    if (prefillEmail && document.getElementById("reqEmail")) {
      document.getElementById("reqEmail").value = prefillEmail.trim();
    }

    if (token && token.length >= 10) {
      cardReq.classList.add("hidden");
      cardRes.classList.remove("hidden");
    }

    wireToggle("tog1", "newPass");
    wireToggle("tog2", "newPass2");

    document.getElementById("btnRequest").onclick = async function () {
      var msg = document.getElementById("msgRequest");
      showMsg(msg, "", false);
      var email = document.getElementById("reqEmail").value.trim();
      if (!email) {
        showMsg(msg, "Укажите почту", false);
        return;
      }
      if (!isValidEmail(email)) {
        showMsg(msg, "Введите корректный адрес почты", false);
        return;
      }
      var btn = document.getElementById("btnRequest");
      btn.disabled = true;
      try {
        var res = await fetch("/auth/email/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (res.status === 429) {
          showMsg(msg, apiErrorDetail(data) || "Слишком часто. Подождите минуту.", false);
          return;
        }
        if (!res.ok) {
          var m = apiErrorDetail(data);
          if (!m) {
            m =
              res.status === 503
                ? "Сервер не смог отправить письмо. Попробуйте позже."
                : "Не удалось отправить. Попробуйте позже.";
          }
          showMsg(msg, m, false);
          return;
        }
        showMsg(
          msg,
          data.message ||
            "Ссылка для сброса пароля отправлена. Если письма нет во «Входящих», проверьте папку «Спам».",
          true
        );
      } catch (e) {
        showMsg(msg, "Нет связи с сервером", false);
      } finally {
        btn.disabled = false;
      }
    };

    document.getElementById("btnReset").onclick = async function () {
      var msg = document.getElementById("msgReset");
      showMsg(msg, "", false);
      var p1 = sanitizePasswordInput(document.getElementById("newPass").value);
      var p2 = sanitizePasswordInput(document.getElementById("newPass2").value);
      if (p1.length < 8) {
        showMsg(msg, "Пароль — не короче 8 символов", false);
        return;
      }
      if (p1 !== p2) {
        showMsg(msg, "Пароли не совпадают", false);
        return;
      }
      var btn = document.getElementById("btnReset");
      btn.disabled = true;
      try {
        var res = await fetch("/auth/email/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, new_password: p1 }),
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          var m = data.detail;
          if (typeof m !== "string") m = "Не удалось сменить пароль";
          showMsg(msg, m, false);
          return;
        }
        showMsg(msg, "Пароль обновлён. Теперь можно войти на главной странице.", true);
        document.getElementById("newPass").disabled = true;
        document.getElementById("newPass2").disabled = true;
        btn.hidden = true;
      } catch (e) {
        showMsg(msg, "Нет связи с сервером", false);
      } finally {
        btn.disabled = false;
      }
    };
  })();
  </script>
</body>
</html>
