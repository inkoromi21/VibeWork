                            '<div class="quiz-module-block"><h3 class="quiz-module-title">' +
                            esc(quizState.careerModuleTitle || 'Карьерные ориентиры') +
                            '</h3>' +
                            renderQuizQuestions(careerQs) +
                            '</div>';
                    }
                    return out;
                }
                return out + renderQuizQuestions(careerQs.length ? careerQs : persQs);
            }

            html += renderTest2Blocks();
            html += '<button type="button" class="btn-primary" id="btnSubmitQuiz">Отправить ответы и получить разбор</button>';
            el.innerHTML = html;
            applyTestSphereSelectValue();
            document.getElementById('testSphereSelect').onchange = async function () {
                testSphereSelection = resolveTestSphereId(profile, this.value, schema);
                quizState.answers = {};
                await renderTestTab();
            };
            el.querySelectorAll('.quiz-opt').forEach(function (b) {
                b.onclick = function () {
                    const qid = parseInt(b.getAttribute('data-qid'), 10);
                    const ch = b.getAttribute('data-choice');
                    quizState.answers[qid] = ch;
                    const parent = b.closest('.quiz-q');
                    parent.querySelectorAll('.quiz-opt').forEach(function (x) { x.classList.remove('selected'); });
                    b.classList.add('selected');
                };
            });
            document.getElementById('btnSubmitQuiz').onclick = async function () {
                const expectedIds =
                    quizState.expectedQuestionIds && quizState.expectedQuestionIds.length
                        ? quizState.expectedQuestionIds
                        : qs.map(function (q) { return q.id; });
                const answers = [];
                for (let i = 0; i < expectedIds.length; i++) {
                    const qid = expectedIds[i];
                    if (!quizState.answers[qid]) {
                        showAppAlert('Ответьте на все вопросы (' + expectedIds.length + ').', 'Тест');
                        return;
                    }
                    answers.push({ question_id: qid, choice: quizState.answers[qid] });
                }
                const btn = this;
                btn.disabled = true;
                const testHost = document.getElementById('tabContent');
                testHost.innerHTML = loadingBlock(
                    'Разбор подготавливается',
                    'ИИ формирует краткий вывод и персональные блоки. Обычно это занимает 15–60 секунд.'
                );
                try {
                    const r = await fetchJson('/vibework/quiz/analyze/' + encodeURIComponent(userId), {
                        method: 'POST',
                        headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                        body: JSON.stringify({
                            answers: answers,
                            interest:
                                quizState.interest ||
                                sphereIdToWebInterest(testSphereSelection, schema) ||
                                undefined
                        })
                    });
                    const data = await r.json();
                    if (!r.ok) throw new Error(data.detail || 'Ошибка');
                    cachedAnalysisPayload = data;
                    cachedAnalysisUserId = userId;
                    hasSavedAnalysis = true;
                    analysisCheckDone = true;
                    testForceWizard = false;
                    savedQuizAnswersMap = {};
                    answers.forEach(function (a) {
                        savedQuizAnswersMap[a.question_id] = a.choice;
                    });
                    savedTestInterest =
                        webInterestToSphereId(quizState.interest, schema) ||
                        testSphereSelection ||
                        null;
                    await renderTestTab();
                    showAppAlert('Тест сохранён. Разбор — на вкладке «Разбор».', 'Готово');
                } catch (e) {
                    showAppAlert(String(e.message || e), 'Ошибка');
                    await renderTestTab();
                    return;
                }
                btn.disabled = false;
            };
        } catch (e) {
            el.innerHTML = '<p>' + esc(e.message) + '</p>';
        }
    }

    function buildReadinessInsightFallback(v, ctx) {
        ctx = ctx || {};
        const axes = ctx.axes || [];
        const gap = ctx.gap || {};
        const prepMap = { weak: 'начальный', medium: 'средний', strong: 'уверенный' };
        const prep = prepMap[(ctx.preparation_level || '').toLowerCase()] || 'средний';
        const pros = [];
        const cons = [];
        if (axes.length) {
            const sorted = axes.slice().sort(function (a, b) {
                return (b.value_percent || 0) - (a.value_percent || 0);
            });
            for (let i = 0; i < sorted.length && pros.length < 2; i++) {
                const pct = sorted[i].value_percent || 0;
                if (pct >= 55) pros.push((sorted[i].label || 'Ось') + ': ' + pct + '%');
            }
            for (let j = sorted.length - 1; j >= 0 && cons.length < 2; j--) {
                const pct = sorted[j].value_percent || 0;
                if (pct < 52) cons.push((sorted[j].label || 'Ось') + ' — ' + pct + '%');
            }
        }
        if (gap.overall_hp != null && gap.overall_hp >= 68) {
            pros.push('Навыки близки к цели (~' + gap.overall_hp + '%)');
        }
        const closing = gap.closing_skills || [];
        for (let k = 0; k < closing.length && cons.length < 3; k++) {
            cons.push('Подтянуть: ' + closing[k]);
        }
        const sc = ctx.scenarios || {};
        if (sc.best_avg_percent != null && sc.best_avg_percent >= 58) {
            pros.push('Сценарий плана ~' + sc.best_avg_percent + '%');
        }
        let why;
        if (v < 40) {
            why = v + '% — стартовая зона: до цели трека ещё путь, опирайтесь на план из разбора.';
        } else if (v < 55) {
            why = v + '% — смешанный профиль: сильные стороны есть, узкие места тянут индекс вниз.';
        } else if (v < 70) {
            why = v + '% — рабочий уровень: близко к цели, добейте навыки из разрыва.';
        } else {
            why = v + '% — сильная база: упор на практику и кейсы.';
        }
        why += ' Подготовка в анкете: ' + prep + '.';
        if (!pros.length) pros.push('Есть опора на результаты теста');
        if (!cons.length) {
            cons.push(v >= 60 ? 'Закрепляйте навыки практикой' : 'Доберите 1–2 навыка из разрыва');
        }
        return { why: why, pros: pros.slice(0, 3), cons: cons.slice(0, 3) };
    }

    function renderReadinessInsightLists(insight) {
        let html = '';
        const blocks = [
            { key: 'pros', label: 'Плюсы' },
            { key: 'cons', label: 'Минусы' }
        ];
        for (let bi = 0; bi < blocks.length; bi++) {
            const b = blocks[bi];
            const items = insight[b.key] || [];
            if (!items.length) continue;
            let list = '<ul style="margin:0;padding-left:18px;font-size:.82rem;line-height:1.45">';
            for (let ii = 0; ii < items.length; ii++) {
                if (items[ii]) list += '<li style="margin-bottom:4px">' + esc(String(items[ii])) + '</li>';
            }
            list += '</ul>';
            html += analysisSpoiler(analysisSummaryTitle(b.label, items.length + ' пункта'), list, { nested: true });
        }
        return html;
    }

    function renderReadinessGauge(r, ctx) {
        if (!r) return '';
        const segs = r.segments || [];
        let bar = '';
        for (let i = 0; i < segs.length; i++) {
            bar += '<div class="readiness-seg" style="background:' + esc(segs[i].color) + '"></div>';
        }
        const v = r.value_percent != null ? r.value_percent : 0;
        const left = Math.max(0, Math.min(100, v));
        const insight =
            r.why && (r.pros || r.cons)
                ? { why: r.why, pros: r.pros || [], cons: r.cons || [] }
                : buildReadinessInsightFallback(v, ctx);
        let whyBlock = analysisSpoiler(
            analysisSummaryTitle('Почему ' + v + '%', truncHint(insight.why, 48)),
            '<p class="readiness-metric__why muted" style="margin:0;font-size:.82rem;line-height:1.5">' + esc(insight.why || '') + '</p>',
            { nested: true }
        );
        return (
            '<div class="readiness-metric">' +
            '<div class="readiness-metric__bar-wrap">' +
            '<div class="readiness-pointer" style="left:' + left + '%" aria-hidden="true"></div>' +
            '<div class="readiness-bar" role="img" aria-label="Готовность ' + esc(String(v)) + '%">' +
            bar +
            '</div></div>' +
            whyBlock +
            renderReadinessInsightLists(insight) +
            '</div>'
        );
    }

    function radarLegendChips(axes) {
        let h = '<div class="radar-legend" aria-label="Расшифровка осей радара">';
        for (let i = 0; i < axes.length; i++) {
            const a = axes[i];
            const pct = a.value_percent != null ? a.value_percent : 0;
            const pos = RADAR_AXIS_POS[i] || '';
            h +=
                '<span class="radar-chip">' +
                (pos ? '<span class="radar-chip-pos" aria-hidden="true">' + pos + '</span>' : '') +
                esc(a.label) +
                ' · ' +
                pct +
                '%</span>';
        }
        h += '</div>';
        return h;
    }

                    const plan = s.plan || [];

                        for (let m = 0; m < checklist.length; m++) {

                        }
                        list += '</ul>';
                        stBody += analysisSpoiler(analysisSummaryTitle('Чеклист', checklist.length + ' пункта'), list, { nested: true });
                    }
                    const route = (s.path_route || '').trim();
                    if (route) {
                        stBody += analysisSpoiler(
                            analysisSummaryTitle('Маршрут обучения', truncHint(route, 36)),
                            '<p class="muted" style="margin:0;font-size:.8rem;line-height:1.45">' + esc(route) + '</p>',
                            { nested: true }
                        );
                    }
                    const stMats = s.materials || [];
                    for (let sm = 0; sm < stMats.length; sm++) {
                        stBody += renderLearnResourceSpoiler(stMats[sm], 'inline');
                    }
                    if (s.when_next) {
                        stBody += analysisSpoiler(
                            analysisSummaryTitle('Когда идти дальше', truncHint(s.when_next, 36)),
                            '<p style="margin:0;font-size:.84rem;line-height:1.45">' + esc(s.when_next) + '</p>',
                            { nested: true }
                        );
                    }
                    const stageHint = (s.subtitle || s.horizon || '').trim();
                    stagesBody += analysisSpoiler(
                        analysisSummaryTitle(
                            'Этап ' + (s.stage != null ? s.stage : i + 1) + ': ' + (s.title || ''),
                            stageHint
                        ),
                        stBody,
                        { nested: true }
                    );
                }
                html += analysisSpoiler(analysisSummaryTitle('Этапы роста', stages.length + ' этапа'), stagesBody, { root: true });
            }
        return html;
    }

    async function persistAiChatSession() {
        if (!userId || !chatSessionId || !chatMessages.length) return;
        try {
            await fetch(
                apiUrl(
                    '/vibework/chat/history/' +
                        encodeURIComponent(userId) +
                        '/' +
                        encodeURIComponent(chatSessionId)
                ),
                {
                    method: 'PUT',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                    body: JSON.stringify({ messages: chatMessages })
                }
            );
        } catch (e) {
            /* офлайн */
        }
    }

    function formatChatHistoryDate(ts) {
        if (ts == null || ts === '') return '';
        try {
            const d = new Date(Number(ts) * 1000);
            return d.toLocaleString('ru-RU', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });
        } catch (e) {
            return '';
        }
    }

    async function refreshChatHistoryList(hostEl) {
        const box = hostEl.querySelector('#chatHistoryList');
        if (!box || !userId) return;
        box.innerHTML = '<p class="muted" style="margin:0;font-size:.72rem">Загрузка…</p>';
        try {
            const res = await fetchJson(apiUrl('/vibework/chat/history/' + encodeURIComponent(userId)));
            const data = await res.json();
            if (!res.ok) throw new Error('x');
            const sessions = data.sessions || [];
            if (!sessions.length) {
                box.innerHTML =
                    '<p class="muted" style="margin:0;font-size:.72rem">Пока нет сохранённых диалогов</p>';
                return;
            }
            let h = '';
            for (let i = 0; i < sessions.length; i++) {
                const s = sessions[i];
                const active = s.session_id === chatSessionId ? ' active' : '';
                h +=
                    '<button type="button" class="chat-history-item' +
                    active +
                    '" data-sid="' +
                    esc(s.session_id) +
                    '">';
                h += '<span class="cht">' + esc(s.title || 'Диалог') + '</span>';
                h +=
                    '<span class="chd">' +
                    esc(formatChatHistoryDate(s.updated_at)) +
                    ' · ' +
                    String(s.message_count || 0) +
                    ' сооб.</span>';
                h += '</button>';
            }
            box.innerHTML = h;
            box.querySelectorAll('.chat-history-item[data-sid]').forEach(function (btn) {
                btn.onclick = async function () {
                    const sid = btn.getAttribute('data-sid');
                    if (!sid || sid === chatSessionId) return;
                    await persistAiChatSession();
                    try {
                        const r = await fetchJson(
                            apiUrl(
                                '/vibework/chat/history/' +
                                    encodeURIComponent(userId) +
                                    '/' +
                                    encodeURIComponent(sid)
                            )
                        );
                        const d = await r.json();
                        if (!r.ok) throw new Error('load');
                        chatSessionId = sid;
                        localStorage.setItem(chatSessionStorageKey(), sid);
                        chatMessages = Array.isArray(d.messages) ? d.messages : [];
                        paintChatLogFromMessages();
                        await refreshChatHistoryList(hostEl);
                    } catch (e) {
                        /* ignore */
                    }
                };
            });
        } catch (e) {
            box.innerHTML =
                '<p class="muted" style="margin:0;font-size:.72rem">Не удалось загрузить историю</p>';
        }
    }

    function hhSalaryLine(s) {
        if (!s || typeof s !== 'object') return '';
        const cur = s.currency === 'RUR' || s.currency === 'RUB' ? '₽' : s.currency || '';
        const f = s.from,
            t = s.to;
        if (f != null && t != null) return String(f) + '–' + String(t) + ' ' + cur;
        if (f != null) return 'от ' + String(f) + ' ' + cur;
        if (t != null) return 'до ' + String(t) + ' ' + cur;
        return '';
    }

    function renderOneHhJobCard(v) {
        const url = v.alternate_url || '';
        const sal = hhSalaryLine(v.salary);
        let sn = '';
        if (v.snippet && typeof v.snippet === 'object') {
            const r = v.snippet.requirement || v.snippet.responsibility || '';
            sn = String(r);
            if (sn.length > 220) sn = sn.substring(0, 220) + '…';
        }
        const meta = [];
        if (v.employer_name) meta.push(v.employer_name);
        if (v.area_name) meta.push(v.area_name);
        if (sal) meta.push(sal);
        if (v.experience) meta.push(v.experience);
        if (v.schedule) meta.push(v.schedule);
        let html = '<div class="block hh-job-card"><div class="hh-job-head"><h4>' + esc(v.name || 'Вакансия') + '</h4></div>';
        if (meta.length) html += '<div class="hh-job-meta">' + esc(meta.join(' · ')) + '</div>';
        if (sn) html += '<div class="hh-job-snippet">' + esc(sn) + '</div>';
        if (url) {
            html +=
                '<a class="hh-job-cta" href="' +
                esc(url) +
                '" target="_blank" rel="noopener noreferrer">Открыть на hh.ru</a>';
        }
        html += '</div>';
        return html;
    }

    function localCitySuggestItems(q) {
        var p = String(q || '').trim().toLowerCase();
        if (p.length < 2) return [];
        var out = [];
        for (var i = 0; i < CITY_SUGGEST_FALLBACK.length; i++) {
            var name = CITY_SUGGEST_FALLBACK[i];
            var n = name.toLowerCase();
            if (n.indexOf(p) === 0 || n.indexOf(p) !== -1) out.push({ id: '', text: name });
            if (out.length >= 12) break;
        }
        return out;
    }

    /**
     * Подсказки городов (API hh.ru), как во вкладке «Вакансии».
     * @param {HTMLInputElement} input
     * @param {HTMLElement} listEl
     * @param {{ syncValue?: function(string): void, afterCommit?: function(): void }} hooks
     */
    function attachCitySuggest(input, listEl, hooks) {
        if (!input || !listEl || input.dataset.citySuggestBound) return;
        input.dataset.citySuggestBound = '1';
        hooks = hooks || {};
        input.setAttribute('autocomplete', 'off');
        input.setAttribute('aria-autocomplete', 'list');
        listEl.setAttribute('role', 'listbox');
        var debounce = null;
        var suppressBlur = false;

        function hideCitySuggest() {
            listEl.hidden = true;
            listEl.innerHTML = '';
            input.removeAttribute('aria-expanded');
        }

        function pickCity(name) {
            suppressBlur = true;
            input.value = name;
            var v = name.trim();
            if (hooks.syncValue) hooks.syncValue(v);
            hideCitySuggest();
            if (hooks.afterCommit) hooks.afterCommit();
            setTimeout(function () {
                suppressBlur = false;
            }, 400);
        }

        function renderCitySuggest(items) {
            listEl.innerHTML = '';
            if (!items || !items.length) {
                hideCitySuggest();
                return;
            }
            for (var i = 0; i < items.length; i++) {
                (function (cityText) {
                    var li = document.createElement('li');
                    li.setAttribute('role', 'option');
                    li.textContent = cityText;
                    li.onmousedown = function (e) {
                        e.preventDefault();
                        pickCity(cityText);
                    };
                    listEl.appendChild(li);
                })(items[i].text);
            }
            listEl.hidden = false;
            input.setAttribute('aria-expanded', 'true');
        }

        async function fetchCitySuggest(q) {
            if (q.length < 2) {
                hideCitySuggest();
                return;
            }
            var items = [];
            try {
                var res = await fetchJson(apiUrl('/career/hh/area-suggest?q=' + encodeURIComponent(q)));
                var data = await res.json();
                if (res.ok) items = data.items || [];
            } catch (e) {
                items = [];
            }
            if (!items.length) items = localCitySuggestItems(q);
            renderCitySuggest(items);
        }

        input.addEventListener('input', function () {
            var v = input.value.trim();
            if (hooks.syncValue) hooks.syncValue(v);
            clearTimeout(debounce);
            debounce = setTimeout(function () {
                fetchCitySuggest(v);
            }, 220);
        });
        input.addEventListener('focus', function () {
            var q = input.value.trim();
            if (q.length >= 2) fetchCitySuggest(q);
        });
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') hideCitySuggest();
        });
        input.addEventListener('blur', function () {
            setTimeout(function () {
                if (suppressBlur) return;
                hideCitySuggest();
                var v = input.value.trim();
                if (hooks.syncValue) hooks.syncValue(v);
                if (hooks.afterCommit) hooks.afterCommit();
            }, 200);
        });
    }

    async function loadHhVacancies(root, append) {
        readJobsFiltersFromUi(root);
        const inner = root.querySelector('#jobsInner');
        const hint = root.querySelector('#jobsSearchHint');
        const moreBtn = root.querySelector('#jobsMoreBtn');
        if (!inner) return;
        if (!append) {
            jobsHhPage = 0;
            inner.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const loadHost = root.querySelector('#tinderActionsHost');
            if (loadHost) {
                loadHost.innerHTML = '';
                loadHost.classList.remove('visible');
                loadHost.setAttribute('aria-hidden', 'true');
            }
        } else if (moreBtn) {
            moreBtn.disabled = true;
        }
        if (append) {
            jobsHhPage++;
        }
        let d;
        try {
            const res = await fetchJson(
                '/career/jobs/hh-live/' + encodeURIComponent(userId) + jobsHhQueryString()
            );
            d = await res.json();
            if (!res.ok) {
                let det = d.detail;
                if (typeof det === 'object') det = JSON.stringify(det);
                throw new Error(String(det || 'Ошибка'));
            }
        } catch (e) {
            inner.innerHTML =
                '<div class="banner-warn">Не удалось загрузить вакансии: ' +
                esc(e.message) +
                '. Проверьте интернет и настройку HH_USER_AGENT на сервере.</div>';
            const errHost = root.querySelector('#tinderActionsHost');
            if (errHost) {
                errHost.innerHTML = '';
                errHost.classList.remove('visible');
                errHost.setAttribute('aria-hidden', 'true');
            }
            if (hint) hint.textContent = '';
            if (moreBtn) {
                moreBtn.style.display = 'none';
                moreBtn.disabled = false;
            }
            return;
        }
        const items = d.items || [];
        if (append) {
            jobsListCache = jobsListCache.concat(items);
        } else {
            jobsListCache = items;
        }
        const found = d.found != null ? d.found : '?';
        const sh = d.search_hint || {};
        const hhUrl = d.hh_search_url || '';
        const notice = d.notice || '';
        if (hint) {
            let hhBtn = '';
            if (hhUrl) {
                hhBtn =
                    ' <a class="btn-secondary" style="padding:6px 10px;font-size:.78rem;text-decoration:none" href="' +
                    esc(String(hhUrl)) +
                    '" target="_blank" rel="noopener noreferrer">Открыть поиск на hh.ru</a>';
            }
            let note = '';
            if (notice) {
                note = '<div class="banner-warn" style="margin-top:8px">' + esc(String(notice)) + '</div>';
            }
            hint.innerHTML =
                'Запрос: <strong>' +
                esc(String(sh.text || '—')) +
                '</strong>' +
                (sh.city ? ' · ' + esc(String(sh.city)) : '') +
                ' · найдено ≈ ' +
                esc(String(found)) +
                hhBtn +
                note;
        }
        const p = d.page != null ? d.page : 0;
        const pages = d.pages != null ? d.pages : 1;
        jobsHhHasMore = p + 1 < pages;
        if (moreBtn) {
            moreBtn.style.display = jobsHhHasMore ? 'block' : 'none';
            moreBtn.disabled = false;
        }
        paintJobsList(root);
    }

    async function applyJobsFiltersFromProfile() {
        if (!userId) return;
        try {
            const pres = await fetchJson('/profile/' + encodeURIComponent(userId));
            const profile = await pres.json();
            cachedProfile = Object.assign({}, profile);
            profileFetchDone = true;
            const city = (profile.city || '').trim();
            if (city) jobsFilters.hh_city = city;
            const sal = profile.target_salary;
            if (sal != null && String(sal).trim() !== '' && !jobsFilters.min_salary) {
                jobsFilters.min_salary = String(sal);
            }
            const wf = String(profile.work_format_preference || '').trim().toLowerCase();
            if (wf === 'remote') jobsFilters.work_format = 'remote';
            else if (wf === 'hybrid' || wf === 'office') jobsFilters.work_format = 'profile';
            let dir = '';
            const main = (profile.main_sphere || '').trim();
            if (main && SPHERE_TO_JOB_DIRECTION[main]) dir = SPHERE_TO_JOB_DIRECTION[main];
            if (!dir) {
                const sp = parseProfileSpheres(profile);
                if (sp.length && SPHERE_TO_JOB_DIRECTION[sp[0]]) dir = SPHERE_TO_JOB_DIRECTION[sp[0]];
            }
            if (dir) jobsFilters.search_direction = dir;
            const pain = (profile.primary_pain || '').trim();
            const prep = (profile.preparation_level || '').trim().toLowerCase();
            const edu = (profile.education_detail || '').trim().toLowerCase();
            if (
                pain === 'pain_no_exp' ||
                prep === 'weak' ||
                edu.indexOf('school') === 0 ||
                edu === 'college' ||
                edu === 'spo'
            ) {
                jobsFilters.level = 'noExperience';
            }
        } catch (e) {
            /* профиль недоступен — оставляем фильтры по умолчанию */
        }
    }

    function renderSimulatorPanel(host) {
        if (!host) return;
        if (!simulatorState) {
            host.innerHTML = '<p class="muted">Загрузка сценариев…</p>';
            (async function () {
                try {
                    if (!simulatorRoleOptions) {
                        const res = await fetchJson(apiUrl('/vibework/simulator/options'));
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.detail || 'Не удалось загрузить список сфер');
                        simulatorRoleOptions = data.options || [];
                    }
                    const pref =
                        cachedProfile && cachedProfile.main_sphere
                            ? String(cachedProfile.main_sphere).trim()
                            : '';
                    let opts = '';
                    for (let i = 0; i < simulatorRoleOptions.length; i++) {
                        const o = simulatorRoleOptions[i];
                        const sel = pref && o.sphere_id === pref ? ' selected' : '';
                        opts +=
                            '<option value="' +
                            esc(o.sphere_id || o.role) +
                            '"' +
                            sel +
                            '>' +
                            esc(o.title || o.label) +
                            '</option>';
                    }
                    host.innerHTML =
                        '<p class="muted" style="margin:0 0 12px">Короткий сценарий рабочего дня под вашу сферу (те же направления, что и главная сфера в анкете).</p>' +
                        '<label for="simRole">Сфера</label>' +
                        '<select id="simRole">' +
                        opts +
                        '</select>' +
                        '<button type="button" class="btn-primary" id="simStart" style="margin-top:12px">Начать день</button>';
                    const startBtn = host.querySelector('#simStart');
                    const roleSel = host.querySelector('#simRole');
                    if (startBtn && roleSel) {
                        startBtn.onclick = async function () {
                            const role = roleSel.value;
                            try {
                                const r = await fetch(apiUrl('/vibework/simulator/start'), {
                                    method: 'POST',
                                    headers: Object.assign(
                                        { 'Content-Type': 'application/json' },
                                        apiFetchHeaders()
                                    ),
                                    body: JSON.stringify({ role: role })
                                });
                                simulatorState = await r.json();
                                renderJobsTab();
                            } catch (e) {
                                showAppAlert(String(e.message || e), 'Ошибка');
                            }
                        };
                    }
                } catch (e) {
                    host.innerHTML =
                        '<p class="muted">' +
                        esc(e.message || String(e)) +
                        '</p><button type="button" class="btn-secondary" onclick="window.__vw.goTab(\'profile\')">К анкете</button>';
                }
            })();
            return;
        }
        const st = simulatorState;
        const node = st.node || {};
        const choices = node.choices || [];
        const stepNum = st.step_index != null ? st.step_index + 1 : 1;
        let html = '';
        if (st.done) {
            html += '<div class="sim-progress">День завершён</div>';
            const recap = (st.day_recap || st.summary || 'День завершён.').trim();
            html +=
                '<div class="block sim-day-recap"><h3 style="margin:0 0 10px;font-size:1rem">Итог дня</h3><pre style="white-space:pre-wrap;font-family:var(--font);font-size:.9rem;line-height:1.5;margin:0;color:var(--text)">' +
                esc(recap) +
                '</pre></div>';
            html += '<button type="button" class="btn-secondary" id="simAgain">Сыграть снова</button>';
            host.innerHTML = html;
            const againBtn = host.querySelector('#simAgain');
            if (againBtn) {
                againBtn.onclick = function () {
                    simulatorState = null;
                    renderJobsTab();
                };
            }
            return;
        }
        html += '<div class="sim-progress">Шаг ' + stepNum + ' — выберите действие</div>';
        const prevInsight = (st.last_choice_insight || '').trim();
        if (prevInsight) {
            html +=
                '<div class="block" style="border-left:3px solid var(--accent, #22c55e);padding-left:12px;margin-bottom:12px">' +
                '<p style="margin:0 0 4px;font-size:.8rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)" class="muted">Отклик к прошлому выбору</p>' +
                '<p style="margin:0;color:var(--text);font-size:.95rem;line-height:1.45">' +
                esc(prevInsight) +
                '</p></div>';
        }
        html += '<div class="block"><p style="color:var(--text);margin:0">' + esc(node.text || '') + '</p></div>';
        for (let i = 0; i < choices.length; i++) {
            const c = choices[i];
            html += '<button type="button" class="quiz-opt" data-cid="' + esc(c.id) + '">' + esc(c.label) + '</button>';
        }
        html += '<div class="row-btns"><button type="button" class="btn-secondary" id="simReset">Сбросить</button></div>';
        host.innerHTML = html;
        host.querySelectorAll('.quiz-opt[data-cid]').forEach(function (b) {
            b.onclick = async function () {
                const cid = b.getAttribute('data-cid');

                    const r = await fetch(apiUrl('/vibework/simulator/step'), {
                        method: 'POST',
                        headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                        body: JSON.stringify({
                            role: st.role,
                            step_index: st.step_index,
                            career_points: st.career_points,
                            choice_id: cid,
                            day_path: st.day_path || []
                        })
                    });
                    simulatorState = await r.json();
                    renderJobsTab();
                } catch (e) {
                    showAppAlert(String(e.message || e), 'Ошибка');
                }
            };
        });
        const resetBtn = host.querySelector('#simReset');
        if (resetBtn) {
            resetBtn.onclick = function () {
                simulatorState = null;
                renderJobsTab();
            };
        }
    }

                const emailDisp =
                    (accountStatus && accountStatus.email) ||
                    localStorage.getItem(USER_EMAIL_KEY) ||
                    '';
                const nickForInput = p.nickname != null && p.nickname !== '' ? String(p.nickname) : '';
                let inferredProfession = '';
                try {
                    const ar = await fetchJson('/vibework/analysis/' + encodeURIComponent(userId));
                    if (ar.ok) {
                        const ad = await ar.json();
                        const inf = ad.inferred_profession || (ad.scenarios && ad.scenarios.inferred_profession);
                        if (inf && inf.label) inferredProfession = String(inf.label);
                    }
                } catch (eAn) {}
                const aboutYouHtml = buildAboutYouHtml(schema, p, emailDisp, {
                    inferredProfession: inferredProfession
                });
                let syncCardHtml = '';
                if (accountStatus && isTgApp && !accountStatus.email) {
                    syncCardHtml +=
                        '<div class="profile-card">' +
                        '<div class="section-title">Сайт и Telegram — один аккаунт</div>' +
                        '<p class="muted" style="margin:0 0 12px">Укажите почту и пароль — по ним можно войти с браузера; анкета и разбор останутся теми же.</p>' +
                        '<label for="vwSyncEmail">Email</label>' +
                        '<input type="email" id="vwSyncEmail" class="auth-field auth-gate-field" autocomplete="email" placeholder="you@example.com">' +
                        '<label for="vwSyncPass" style="margin-top:10px">Пароль (не короче 8 символов)</label>' +
                        authPwdFieldHtml('vwSyncPass', 'Не меньше 8 символов', 'new-password') +
                        '<label for="vwSyncPass2" style="margin-top:10px">Пароль ещё раз</label>' +
                        authPwdFieldHtml('vwSyncPass2', '', 'new-password') +
                        '<p id="vwSyncRegErr" style="display:none;margin-top:8px;color:#c62828;font-size:0.875rem"></p>' +
                        '<button type="button" class="btn-primary" style="margin-top:12px" id="vwSyncRegBtn">Сохранить почту для входа на сайте</button>' +
                        '<div class="nav-sep" style="margin:18px 0"></div>' +
                        '<p class="muted" style="margin:0 0 8px;font-size:0.85rem">Уже есть аккаунт на сайте?</p>' +
                        '<label for="vwBindEmail">Email</label>' +
                        '<input type="email" id="vwBindEmail" class="auth-field auth-gate-field" autocomplete="email">' +
                        '<label for="vwBindPass" style="margin-top:10px">Пароль</label>' +
                        authPwdFieldHtml('vwBindPass', '', 'current-password') +
                        '<p id="vwSyncBindErr" style="display:none;margin-top:8px;color:#c62828;font-size:0.875rem"></p>' +
                        '<button type="button" class="btn-secondary" style="margin-top:12px" id="vwSyncBindBtn">Войти в существующий аккаунт и объединить</button>' +
                        '</div>';
                }
                if (accountStatus && !isTgApp && accountStatus.email && !accountStatus.telegram_linked) {
                    if (accountStatus.telegram_login_bot_username) {
                        syncCardHtml +=
                            '<div class="profile-card profile-card--telegram" style="margin-top:16px">' +
                            '<div class="section-title">Привязать Telegram</div>' +
                            '<p class="muted" style="margin:0 0 12px">Нажмите кнопку ниже — мини-приложение и сайт будут в одном аккаунте.</p>' +
                            '<div id="vwTgWidgetMount" class="tg-widget-mount"></div>' +
                            '</div>';
                    } else {
                        syncCardHtml +=
                            '<div class="profile-card profile-card--telegram" style="margin-top:16px">' +
                            '<div class="section-title">Telegram</div>' +
                            '<p class="muted" style="margin:0">Кнопка входа недоступна: на сервере задайте TELEGRAM_BOT_TOKEN (и при необходимости TELEGRAM_BOT_USERNAME) в .env и перезапустите API.</p>' +
                            '</div>';
                    }
                }
                let html =
                    '<h2>Аккаунт</h2>' +
                    '<div class="profile-shell">' +
                    syncCardHtml +
                    '<div class="profile-card">' +
                    '<div class="section-title">Никнейм</div>' +
                    '<label>Имя в интерфейсе</label>' +
                    '<input type="text" id="vwAccNickname" maxlength="80" autocomplete="nickname" value="' +
                    esc(nickForInput) +
                    '" placeholder="Например, Сёма" style="width:100%;max-width:420px">' +
                    '<p id="vwAccNickErr" style="display:none;margin-top:8px;color:#c62828;font-size:0.875rem"></p>' +
                    '<button type="button" class="btn-primary" style="margin-top:12px" id="vwAccSaveNick">Сохранить никнейм</button>' +
                    '</div>' +
                    '<div class="profile-card" style="margin-top:16px">' +
                    '<div class="section-title">О вас</div>' +
                    aboutYouHtml +
                    '</div>' +
                    '<div class="profile-card" style="margin-top:16px">' +
                    '<div class="section-title">Смена пароля</div>' +
                    '<label>Текущий пароль</label>' +
                    '<input type="password" id="vwAccOldPwd" autocomplete="current-password" style="width:100%;max-width:420px">' +
                    '<label style="margin-top:12px">Новый пароль</label>' +
                    '<input type="password" id="vwAccNewPwd" autocomplete="new-password" style="width:100%;max-width:420px">' +
                    '<label style="margin-top:12px">Повтор нового пароля</label>' +
                    '<input type="password" id="vwAccNewPwd2" autocomplete="new-password" style="width:100%;max-width:420px">' +
                    '<p id="vwAccPwdErr" style="display:none;margin-top:10px;color:#c62828;font-size:0.875rem"></p>' +
                    '<div class="account-pwd-actions">' +
                    '<button type="button" class="btn-primary" id="vwAccChangePwd">Сохранить новый пароль</button>' +
                    '<button type="button" class="btn-secondary btn-account-delete" id="vwAccDeleteAccount">Удалить аккаунт</button>' +
                    '</div>' +
                    '</div></div>';
                el.innerHTML = html;
                wirePasswordFields();
                if (
                    accountStatus &&
                    !isTgApp &&
                    accountStatus.email &&
                    !accountStatus.telegram_linked &&
                    accountStatus.telegram_login_bot_username
                ) {
                    mountTelegramLoginWidget(accountStatus.telegram_login_bot_username);
                }
                const syncReg = document.getElementById('vwSyncRegBtn');
                if (syncReg) {
                    syncReg.onclick = async function () {
                        const err = document.getElementById('vwSyncRegErr');
                        err.style.display = 'none';
                        const em = (document.getElementById('vwSyncEmail').value || '').trim();
                        const p1 = document.getElementById('vwSyncPass').value;
                        const p2 = document.getElementById('vwSyncPass2').value;
                        if (!isValidEmailAddress(em)) {
                            err.textContent = 'Введите корректный email';
                            err.style.display = 'block';
                            return;
                        }
                        if (p1.length < 8) {
                            err.textContent = 'Пароль — не короче 8 символов';
                            err.style.display = 'block';
                            return;
                        }
                        if (p1 !== p2) {
                            err.textContent = 'Пароли не совпадают';
                            err.style.display = 'block';
                            return;
                        }
                        syncReg.disabled = true;
                        try {
                            const res = await fetch(apiUrl('/auth/account/email/register'), {
                                method: 'POST',
                                headers: Object.assign(
                                    { 'Content-Type': 'application/json' },
                                    apiFetchHeaders()
                                ),
                                body: JSON.stringify({ email: em, password: p1 }),
                            });
                            const data = await res.json().catch(function () {
                                return {};
                            });
                            if (!res.ok) {
                                err.textContent =
                                    typeof data.detail === 'string'
                                        ? data.detail
                                        : 'Ошибка ' + res.status;
                                err.style.display = 'block';
                                syncReg.disabled = false;
                                return;
                            }
                            localStorage.setItem(ACCESS_TOKEN_KEY, data.access_token);
                            localStorage.setItem('userId', data.user_id);
                            localStorage.setItem(USER_EMAIL_KEY, data.email || em);
                            userId = data.user_id;
                            profileFetchDone = false;
                            showAppAlert('Почта сохранена — можно входить с сайта с тем же паролем.', 'Готово');
                            await renderShell();
                        } catch (e) {
                            err.textContent = String(e.message || e);
                            err.style.display = 'block';
                        }
                        syncReg.disabled = false;
                    };
                }
                const syncBind = document.getElementById('vwSyncBindBtn');
                if (syncBind) {
                    syncBind.onclick = async function () {
                        const err = document.getElementById('vwSyncBindErr');
                        err.style.display = 'none';
                        const em = (document.getElementById('vwBindEmail').value || '').trim();
                        const pw = document.getElementById('vwBindPass').value;
                        if (!isValidEmailAddress(em)) {
                            err.textContent = 'Введите корректный email';
                            err.style.display = 'block';
                            return;
                        }
                        if (!pw) {
                            err.textContent = 'Введите пароль';
                            err.style.display = 'block';
                            return;
                        }
                        syncBind.disabled = true;
                        try {
                            const res = await fetch(apiUrl('/auth/account/email/bind'), {
                                method: 'POST',
                                headers: Object.assign(
                                    { 'Content-Type': 'application/json' },
                                    apiFetchHeaders()
                                ),
                                body: JSON.stringify({ email: em, password: pw }),
                            });
                            const data = await res.json().catch(function () {
                                return {};
                            });
                            if (!res.ok) {
                                err.textContent =
                                    typeof data.detail === 'string'
                                        ? data.detail
                                        : 'Ошибка ' + res.status;
                                err.style.display = 'block';
                                syncBind.disabled = false;
                                return;
                            }
                            localStorage.setItem(ACCESS_TOKEN_KEY, data.access_token);
                            localStorage.setItem('userId', data.user_id);
                            localStorage.setItem(USER_EMAIL_KEY, data.email || em);
                            userId = data.user_id;
                            profileFetchDone = false;
                            showAppAlert(
                                data.merged
                                    ? 'Аккаунты объединены. Дальше входите по этой почте на сайте.'
                                    : 'Готово.',
                                'Готово'
                            );
                            await renderShell();
                        } catch (e) {
                            err.textContent = String(e.message || e);
                            err.style.display = 'block';
                        }
                        syncBind.disabled = false;
                    };
                }
                document.getElementById('vwAccSaveNick').onclick = async function () {
                    const errEl = document.getElementById('vwAccNickErr');
                    errEl.style.display = 'none';
                    errEl.textContent = '';
                    const raw = document.getElementById('vwAccNickname').value || '';
                    const v = raw.trim();
                    const btn = this;
                    btn.disabled = true;
                    try {
                        const r = await fetchJson('/profile/' + encodeURIComponent(userId), {
                            method: 'POST',
                            headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                            body: JSON.stringify({ nickname: v.length ? v : '' })
                        });
                        if (!r.ok) {
                            const data = await r.json().catch(function () { return {}; });
                            let m = data.detail;
                            if (Array.isArray(m)) {
                                m = m.map(function (x) { return x.msg || JSON.stringify(x); }).join('; ');
                            }
                            if (typeof m === 'object' && m !== null) m = JSON.stringify(m);
                            if (typeof m !== 'string') m = 'Ошибка ' + r.status;
                            errEl.textContent = m;
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        await refreshCachedProfile();
                        await renderShell();
                        showAppAlert('Никнейм сохранён.', 'Готово');
                    } catch (e) {
                        errEl.textContent = String(e.message || e);
                        errEl.style.display = 'block';
                    }
                    btn.disabled = false;
                };
                document.getElementById('vwAccChangePwd').onclick = async function () {
                    const errEl = document.getElementById('vwAccPwdErr');
                    const oldP = (document.getElementById('vwAccOldPwd').value || '').trim();
                    const n1 = (document.getElementById('vwAccNewPwd').value || '').trim();
                    const n2 = (document.getElementById('vwAccNewPwd2').value || '').trim();
                    errEl.style.display = 'none';
                    errEl.textContent = '';
                    if (!oldP) {
                        errEl.textContent = 'Введите текущий пароль.';
                        errEl.style.display = 'block';
                        return;
                    }
                    if (n1.length < 8) {
                        errEl.textContent = 'Новый пароль — не короче 8 символов.';
                        errEl.style.display = 'block';
                        return;
                    }
                    if (n1 !== n2) {
                        errEl.textContent = 'Новый пароль и повтор не совпадают.';
                        errEl.style.display = 'block';
                        return;
                    }
                    const btn = this;
                    btn.disabled = true;
                    try {
                        let res;
                        try {
                            res = await fetch(apiUrl('/auth/email/change-password/' + encodeURIComponent(userId)), {
                                method: 'POST',
                                headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                                body: JSON.stringify({ current_password: oldP, new_password: n1 })
                            });
                        } catch (e) {
                            errEl.textContent = 'Нет связи с сервером';
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        const data = await res.json().catch(function () { return {}; });
                        if (res.status === 401) {
                            clearAuth();
                            showAuthScreen();
                            btn.disabled = false;
                            return;
                        }
                        if (!res.ok) {
                            let m = data.detail;
                            if (Array.isArray(m)) {
                                m = m.map(function (x) { return x.msg || JSON.stringify(x); }).join('; ');
                            }
                            if (typeof m === 'object' && m !== null) m = JSON.stringify(m);
                            if (typeof m !== 'string') m = 'Ошибка ' + res.status;
                            errEl.textContent = m;
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        document.getElementById('vwAccOldPwd').value = '';
                        document.getElementById('vwAccNewPwd').value = '';
                        document.getElementById('vwAccNewPwd2').value = '';
                        showAppAlert('Пароль обновлён.', 'Готово');
                    } catch (e) {
                        errEl.textContent = String(e.message || e);
                        errEl.style.display = 'block';
                    }
                    btn.disabled = false;
                };
                document.getElementById('vwAccDeleteAccount').onclick = function () {
                    showAppConfirm(
                        'Аккаунт и все данные (анкета, ответы, чаты, прогресс) будут удалены без возможности восстановления.',
                        'Вы уверены?',
                        async function () {
                            try {
                                const res = await fetch(apiUrl('/auth/account'), {
                                    method: 'DELETE',
                                    headers: apiFetchHeaders()
                                });
                                if (res.status === 401) {
                                    clearAuth();
                                    showAuthScreen();
                                    return;
                                }
                                const data = await res.json().catch(function () { return {}; });
                                if (!res.ok) {
                                    let m = data.detail;
                                    if (typeof m !== 'string') m = 'Не удалось удалить аккаунт.';
                                    showAppAlert(m, 'Ошибка');
                                    return;
                                }
                                clearAuth();
                                showAuthScreen();
                                showAppAlert('Аккаунт удалён.', 'Готово');
                            } catch (e) {
                                showAppAlert(String(e.message || e), 'Ошибка');
                            }
                        }
                    );
                };
            } catch (e) {
                el.innerHTML = '<p class="muted">' + esc(String(e.message || e)) + '</p>';
            }
        })();
    }

    function renderHomeTab() {
        const el = document.getElementById('tabContent');
        let html =
            '<div class="hub-page">' +
            '<h2 class="hub-heading">Разделы</h2>' +
            '<p class="hub-lead">Выберите блок — анкета, тесты, разбор, чат или вакансии (подбор и симулятор дня).</p>' +
            '<div class="hub-grid">';
        for (let i = 0; i < SECTION_TABS.length; i++) {
            const t = SECTION_TABS[i];
            html +=
                '<button type="button" class="hub-card" data-hub-tab="' +
                esc(t.id) +
                '"><span class="hub-card-ico">' +
                t.ico +
                '</span><span class="hub-card-title">' +
                esc(t.label) +
                '</span><span class="hub-card-hint">' +
                esc(tabTagline(t.id)) +
                '</span></button>';
        }
        html += '</div></div>';
        el.innerHTML = html;
        el.querySelectorAll('.hub-card[data-hub-tab]').forEach(function (btn) {
            btn.onclick = async function () {
                currentTab = btn.getAttribute('data-hub-tab');
                await renderShell();
            };
        });
    }

    function renderTabContent() {
        if (currentTab === 'home') return renderHomeTab();
        if (currentTab === 'account') return renderAccountTab();
        if (currentTab === 'profile') return renderProfileTab();
        if (currentTab === 'test') return renderTestTab();
        if (currentTab === 'analysis') return renderAnalysisTab();
        if (currentTab === 'chat') return renderChatTab();
        if (currentTab === 'jobs') return renderJobsTab();
    }

    function mountTelegramLoginWidget(botUsername) {
        var mount = document.getElementById('vwTgWidgetMount');
        if (!mount || !botUsername) return;
        mount.innerHTML = '';
        var scr = document.createElement('script');
        scr.async = true;
        scr.src = 'https://telegram.org/js/telegram-widget.js?22';
        scr.setAttribute('data-telegram-login', botUsername);
        scr.setAttribute('data-size', 'large');
        scr.setAttribute('data-onauth', 'onTelegramAuth(user)');
        scr.setAttribute('data-request-access', 'write');
        mount.appendChild(scr);
    }

    window.__vw = {
        submitAuth: submitAuth,
        logout: logout,
        toggleTheme: toggleAppTheme,
        goTab: async function (id) {
            if (id === 'simulator') {
                jobsSectionMode = 'simulator';
                persistJobsSectionMode();
                currentTab = 'jobs';
            } else {
                currentTab = id;
            }
            await renderShell();
        },
        onTelegramWidget: async function (user) {
            if (!user || user.id == null) return;
            try {
                var res = await fetch(apiUrl('/auth/account/telegram/widget'), {
                    method: 'POST',
                    headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                    body: JSON.stringify(user),
                });
                var data = await res.json().catch(function () {
                    return {};
                });
                if (!res.ok) {
                    var m = data.detail;
                    if (typeof m !== 'string') m = 'Ошибка ' + res.status;
                    showAppAlert(m, 'Не удалось привязать');
                    return;
                }
                showAppAlert(
                    data.merged ? 'Telegram привязан, данные объединены.' : 'Telegram уже был привязан.',
                    'Готово'
                );
                await renderShell();
            } catch (e) {
                showAppAlert(String(e.message || e), 'Ошибка');
            }
        },
    };
    window.onTelegramAuth = function (user) {
        if (window.__vw && window.__vw.onTelegramWidget) {
            window.__vw.onTelegramWidget(user);
        }
    };

    async function tryTelegramWebAppAuth() {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) return false;
        var raw = tg.initData;
        if (!raw || typeof raw !== 'string' || !raw.length) return false;
        try {
            var res = await fetch(apiUrl('/auth/telegram/'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ init_data: raw }),
            });
            if (!res.ok) return false;
            var data = await res.json().catch(function () {
                return {};
            });
            if (!data.access_token || !data.user_id) return false;
            const prevTg = userId || localStorage.getItem('userId') || '';
            if (prevTg && prevTg !== data.user_id) resetProfileStateForAccountSwitch();
            localStorage.setItem(ACCESS_TOKEN_KEY, data.access_token);
            localStorage.setItem('userId', data.user_id);
            userId = data.user_id;
            profileFetchDone = false;
            profileDraftSessionUser = null;
            if (vwShared() && vwShared().rememberActiveUserId) vwShared().rememberActiveUserId(data.user_id);
            currentTab = 'profile';
            sessionCheckedThisPage = false;
            return true;
        } catch (e) {
            return false;
        }
    }

    async function validateStoredSession() {
        const tok = localStorage.getItem(ACCESS_TOKEN_KEY);
        const uid = localStorage.getItem('userId') || userId;
        if (!uid || !tok) return false;
        userId = uid;
        try {
            const res = await fetch(apiUrl('/auth/session'), { headers: apiFetchHeaders() });
            if (res.status === 401 || res.status === 403 || res.status === 404) return false;
            if (!res.ok) return false;
            const data = await res.json().catch(function () { return {}; });
            if (!data.ok || !data.user_id) return false;
            if (uid !== data.user_id) {
                resetProfileStateForAccountSwitch();
                profileFetchDone = false;
            }
            userId = data.user_id;
            localStorage.setItem('userId', data.user_id);
            if (data.email) localStorage.setItem(USER_EMAIL_KEY, data.email);
            return true;
        } catch (e) {
            return false;
        }
    }

    async function ensureSessionStillValid() {
        if (!userId || !localStorage.getItem(ACCESS_TOKEN_KEY)) return false;
        if (sessionCheckedThisPage) return true;
        const ok = await validateStoredSession();
        sessionCheckedThisPage = true;
        if (!ok) {
            clearAuth();
            showAuthScreen();
        }
        return ok;
    }

    function showBootstrapError(err) {
        console.error('[VibeWork miniapp]', err);
        var app = document.getElementById('app');
        if (!app) return;
        app.innerHTML =
            MINIAPP_BG_HTML +
            '<div class="layout layout--auth" style="padding:24px">' +
            '<p class="auth-error" style="display:block">Не удалось открыть приложение. Обновите страницу или войдите заново.</p>' +
            '<button type="button" class="btn-primary" style="width:100%;margin-top:12px" onclick="location.reload()">Обновить</button>' +
            '</div>';
    }

    (async function bootstrap() {
        try {
            var bootParams = new URLSearchParams(window.location.search);
            if (bootParams.get('auth') === 'login') {
                clearAuth();
                try {
                    var cleanUrl = new URL(window.location.href);
                    cleanUrl.searchParams.delete('auth');
                    window.history.replaceState({}, '', cleanUrl.pathname + cleanUrl.search + cleanUrl.hash);
                } catch (urlErr) { /* */ }
                showAuthScreen();
                return;
            }
            if (await tryTelegramWebAppAuth()) {
                await renderShell();
                return;
            }
            const tok = localStorage.getItem(ACCESS_TOKEN_KEY);
            if (userId && tok) {
                if (await validateStoredSession()) {
                    const sh = vwShared();
                    if (sh && sh.isNewAccountOnboarding && sh.isNewAccountOnboarding()) {
                        startProfileOnboarding();
                    }
                    await renderShell();
                } else {
                    clearAuth();
                    showAuthScreen();
                }
            } else showAuthScreen();
        } catch (e) {
            showBootstrapError(e);
        }
    })();
})();
</script>
