    function jobsHhQueryString() {
        let q = '?page=' + jobsHhPage + '&per_page=15';
        if (jobsFilters.work_format === 'remote') q += '&only_remote=true';
        if (jobsFilters.work_format === 'profile') q += '&strict_work_format=true';
        q += '&hh_experience=' + encodeURIComponent(jobsFilters.level || 'any');
        const ms = parseInt(String(jobsFilters.min_salary || '').trim(), 10);
        if (!isNaN(ms) && ms > 0) q += '&min_salary=' + ms;
        if (jobsFilters.search_direction)
            q += '&search_direction=' + encodeURIComponent(jobsFilters.search_direction);
        if (jobsFilters.hh_city) q += '&hh_city=' + encodeURIComponent(jobsFilters.hh_city);
        return q;
    }

    function hhSalaryLine(s) {
        if (!s || typeof s !== 'object') return '';
        const cur = s.currency === 'RUR' || s.currency === 'RUB' ? '₽' : s.currency || '';
        const f = s.from,
            t = s.to;
        if (f != null && t != null) return String(f) + '–' + String(t) + ' ' + cur;
        if (f != null) return 'от ' + String(f) + ' ' + cur;
        if (t != null) return 'до ' + String(t) + ' ' + cur;
        return '';
    }

    function renderOneHhJobCard(v) {
        const url = v.alternate_url || '';
        const sal = hhSalaryLine(v.salary);
        let sn = '';
        if (v.snippet && typeof v.snippet === 'object') {
            const r = v.snippet.requirement || v.snippet.responsibility || '';
            sn = String(r);
            if (sn.length > 220) sn = sn.substring(0, 220) + '…';
        }
        const meta = [];
        if (v.employer_name) meta.push(v.employer_name);
        if (v.area_name) meta.push(v.area_name);
        if (sal) meta.push(sal);
        if (v.experience) meta.push(v.experience);
        if (v.schedule) meta.push(v.schedule);
        let html = '<div class="block hh-job-card"><div class="hh-job-head"><h4>' + esc(v.name || 'Вакансия') + '</h4></div>';
        if (meta.length) html += '<div class="hh-job-meta">' + esc(meta.join(' · ')) + '</div>';
        if (sn) html += '<div class="hh-job-snippet">' + esc(sn) + '</div>';
        if (url) {
            html +=
                '<a class="hh-job-cta" href="' +
                esc(url) +
                '" target="_blank" rel="noopener noreferrer">Открыть на hh.ru</a>';
        }
        html += '</div>';
        return html;
    }

    function wireTinderHh(root, list) {
        function show() {
            const wrap = document.getElementById('tinderStack');
            if (!wrap || !list.length) return;
            if (tinderIndex >= list.length) {
                if (jobsHhHasMore) {
                    wrap.innerHTML =
                        '<div class="block">Вы просмотрели все карточки из текущей загрузки.</div>' +
                        '<button type="button" class="btn-secondary btn-more-jobs" id="tinderLoadMoreInline" style="margin-top:12px">Загрузить ещё</button>';
                    const inlineMore = document.getElementById('tinderLoadMoreInline');
                    if (inlineMore) {
                        inlineMore.onclick = function () {
                            readJobsFiltersFromUi(root);
                            loadHhVacancies(root, true);
                        };
                    }
                } else {
                    wrap.innerHTML =
                        '<div class="block">Карточки закончились — это всё, что нашлось по запросу. Смените фильтры или откройте поиск на hh.ru по ссылке выше.</div>';
                }
                return;
            }
            const v = list[tinderIndex];
            wrap.innerHTML = '<div class="tinder-card">' + renderOneHhJobCard(v) + '</div>';
        }
        show();
        const skip = document.getElementById('tinderSkip');
        const like = document.getElementById('tinderLike');
        if (skip) {
            skip.onclick = function () {
                tinderIndex++;
                show();
            };
        }
        if (like) {
            like.onclick = function () {
                tinderIndex++;
                show();
            };
        }
    }

        jobsFilters.hh_city = c ? c.value : '';

        jobsFilters.level = lv ? lv.value : 'any';

    /**
     * Подсказки городов (API hh.ru), как во вкладке «Вакансии».
     * @param {HTMLInputElement} input
     * @param {HTMLElement} listEl
     * @param {{ syncValue?: function(string): void, afterCommit?: function(): void }} hooks
     */
    function attachCitySuggest(input, listEl, hooks) {
        hooks = hooks || {};
        let debounce = null;
        let suppressBlur = false;

        function hideCitySuggest() {
            listEl.hidden = true;
            listEl.innerHTML = '';
        }

        function renderCitySuggest(items) {
            listEl.innerHTML = '';
            if (!items || !items.length) {
                hideCitySuggest();
                return;
            }
            for (let i = 0; i < items.length; i++) {
                const it = items[i];
                const li = document.createElement('li');
                li.setAttribute('role', 'option');
                li.textContent = it.text;
                li.onmousedown = function (e) {
                    e.preventDefault();
                    suppressBlur = true;
                    input.value = it.text;
                    const v = it.text.trim();
                    if (hooks.syncValue) hooks.syncValue(v);
                    hideCitySuggest();
                    if (hooks.afterCommit) hooks.afterCommit();
                    setTimeout(function () {
                        suppressBlur = false;
                    }, 400);
                };
                listEl.appendChild(li);
            }
            listEl.hidden = false;
        }

        async function fetchCitySuggest(q) {
            if (q.length < 2) {
                hideCitySuggest();
                return;
            }
            try {
                const res = await fetchJson(apiUrl('/career/hh/area-suggest?q=' + encodeURIComponent(q)));
                const data = await res.json();
                if (!res.ok) throw new Error('suggest');
                renderCitySuggest(data.items || []);
            } catch (e) {
                hideCitySuggest();
            }
        }

        input.addEventListener('input', function () {
            const v = input.value.trim();
            if (hooks.syncValue) hooks.syncValue(v);
            clearTimeout(debounce);
            debounce = setTimeout(function () {
                fetchCitySuggest(v);
            }, 280);
        });
        input.addEventListener('focus', function () {
            const q = input.value.trim();
            if (q.length >= 2) fetchCitySuggest(q);
        });
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') hideCitySuggest();
        });
        input.addEventListener('blur', function () {
            setTimeout(function () {
                if (suppressBlur) return;
                hideCitySuggest();
                const v = input.value.trim();
                if (hooks.syncValue) hooks.syncValue(v);
                if (hooks.afterCommit) hooks.afterCommit();
            }, 200);
        });
    }

    async function loadHhVacancies(root, append) {
        readJobsFiltersFromUi(root);
        const inner = root.querySelector('#jobsInner');
        const hint = root.querySelector('#jobsSearchHint');
        const moreBtn = root.querySelector('#jobsMoreBtn');
        if (!inner) return;
        if (!append) {
            jobsHhPage = 0;
            inner.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            const loadHost = root.querySelector('#tinderActionsHost');
            if (loadHost) {
                loadHost.innerHTML = '';
                loadHost.classList.remove('visible');
                loadHost.setAttribute('aria-hidden', 'true');
            }
        } else if (moreBtn) {
            moreBtn.disabled = true;
        }
        if (append) {
            jobsHhPage++;
        }
        let d;
        try {
            const res = await fetchJson(
                '/career/jobs/hh-live/' + encodeURIComponent(userId) + jobsHhQueryString()
            );
            d = await res.json();
            if (!res.ok) {
                let det = d.detail;
                if (typeof det === 'object') det = JSON.stringify(det);
                throw new Error(String(det || 'Ошибка'));
            }
        } catch (e) {
            inner.innerHTML =
                '<div class="banner-warn">Не удалось загрузить вакансии: ' +
                esc(e.message) +
                '. Проверьте интернет и настройку HH_USER_AGENT на сервере.</div>';
            const errHost = root.querySelector('#tinderActionsHost');
            if (errHost) {
                errHost.innerHTML = '';
                errHost.classList.remove('visible');
                errHost.setAttribute('aria-hidden', 'true');
            }
            if (hint) hint.textContent = '';
            if (moreBtn) {
                moreBtn.style.display = 'none';
                moreBtn.disabled = false;
            }
            return;
        }
        const items = d.items || [];
        if (append) {
            jobsListCache = jobsListCache.concat(items);
        } else {
            jobsListCache = items;
        }
        const found = d.found != null ? d.found : '?';
        const sh = d.search_hint || {};
        const hhUrl = d.hh_search_url || '';
        const notice = d.notice || '';
        if (hint) {
            let hhBtn = '';
            if (hhUrl) {
                hhBtn =
                    ' <a class="btn-secondary" style="padding:6px 10px;font-size:.78rem;text-decoration:none" href="' +
                    esc(String(hhUrl)) +
                    '" target="_blank" rel="noopener noreferrer">Открыть поиск на hh.ru</a>';
            }
            let note = '';
            if (notice) {
                note = '<div class="banner-warn" style="margin-top:8px">' + esc(String(notice)) + '</div>';
            }
            hint.innerHTML =
                'Запрос: <strong>' +
                esc(String(sh.text || '—')) +
                '</strong>' +
                (sh.city ? ' · ' + esc(String(sh.city)) : '') +
                ' · найдено ≈ ' +
                esc(String(found)) +
                hhBtn +
                note;
        }
        const p = d.page != null ? d.page : 0;
        const pages = d.pages != null ? d.pages : 1;
        jobsHhHasMore = p + 1 < pages;
        if (moreBtn) {
            moreBtn.style.display = jobsHhHasMore ? 'block' : 'none';
            moreBtn.disabled = false;
        }
        paintJobsList(root);
    }

                        opts +
                        '</select>' +
                        '<button type="button" class="btn-primary" id="simStart">Начать день</button>';
                    document.getElementById('simStart').onclick = async function () {
                        const role = document.getElementById('simRole').value;
                        try {
                            const r = await fetch(apiUrl('/vibework/simulator/start'), {
                                method: 'POST',
                                headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                                body: JSON.stringify({ role: role })
                            });
                            simulatorState = await r.json();
                            renderSimulatorTab();
                        } catch (e) {
                            showAppAlert(String(e.message || e), 'Ошибка');
                        }
                    };
                } catch (e) {
                    el.innerHTML =

                        '</p><button type="button" class="btn-secondary" onclick="window.__vw.goTab(\'profile\')">К анкете</button>';
                }
            })();
            return;
        }
        const st = simulatorState;
        const node = st.node || {};
        const choices = node.choices || [];
        const stepNum = st.step_index != null ? st.step_index + 1 : 1;
        let html =
            '<h2>День на работе</h2><div class="sim-progress">Шаг ' + stepNum + ' — выберите действие</div>';

            html += '<div class="block"><p style="color:var(--text)">' + esc(node.text || 'День завершён.') + '</p></div>';
            html += '<button type="button" class="btn-secondary" id="simAgain">Сыграть снова</button>';
            el.innerHTML = html;
            document.getElementById('simAgain').onclick = function () {
                simulatorState = null;
                renderSimulatorTab();
            };
            return;
        }
        html += '<div class="block"><p style="color:var(--text);margin:0">' + esc(node.text || '') + '</p></div>';
        for (let i = 0; i < choices.length; i++) {
            const c = choices[i];
            html += '<button type="button" class="quiz-opt" data-cid="' + esc(c.id) + '">' + esc(c.label) + '</button>';

        el.querySelectorAll('.quiz-opt[data-cid]').forEach(function (b) {

                const cid = b.getAttribute('data-cid');
                try {
                    const r = await fetch(apiUrl('/vibework/simulator/step'), {
                        method: 'POST',
                        headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                        body: JSON.stringify({
                            role: st.role,
                            step_index: st.step_index,
                            career_points: st.career_points,
                            choice_id: cid
                        })
                    });
                    simulatorState = await r.json();
                    renderSimulatorTab();
                } catch (e) {
                    showAppAlert(String(e.message || e), 'Ошибка');
                }
            };
        });

            simulatorState = null;
            renderSimulatorTab();
        };
    }

                            let m = data.detail;
                            if (Array.isArray(m)) {
                                m = m.map(function (x) { return x.msg || JSON.stringify(x); }).join('; ');
                            }
                            if (typeof m === 'object' && m !== null) m = JSON.stringify(m);
                            if (typeof m !== 'string') m = 'Ошибка ' + r.status;
                            errEl.textContent = m;
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        await refreshCachedProfile();
                        await renderShell();
                        showAppAlert('Никнейм сохранён.', 'Готово');
                    } catch (e) {
                        errEl.textContent = String(e.message || e);
                        errEl.style.display = 'block';
                    }
                    btn.disabled = false;
                };
                document.getElementById('vwAccChangePwd').onclick = async function () {
                    const errEl = document.getElementById('vwAccPwdErr');
                    const oldP = (document.getElementById('vwAccOldPwd').value || '').trim();
                    const n1 = (document.getElementById('vwAccNewPwd').value || '').trim();
                    const n2 = (document.getElementById('vwAccNewPwd2').value || '').trim();
                    errEl.style.display = 'none';
                    errEl.textContent = '';
                    if (!oldP) {
                        errEl.textContent = 'Введите текущий пароль.';
                        errEl.style.display = 'block';
                        return;
                    }
                    if (n1.length < 8) {
                        errEl.textContent = 'Новый пароль — не короче 8 символов.';
                        errEl.style.display = 'block';
                        return;
                    }
                    if (n1 !== n2) {
                        errEl.textContent = 'Новый пароль и повтор не совпадают.';
                        errEl.style.display = 'block';
                        return;
                    }
                    const btn = this;
                    btn.disabled = true;
                    try {
                        let res;
                        try {
                            res = await fetch(apiUrl('/auth/email/change-password/' + encodeURIComponent(userId)), {
                                method: 'POST',
                                headers: Object.assign({ 'Content-Type': 'application/json' }, apiFetchHeaders()),
                                body: JSON.stringify({ current_password: oldP, new_password: n1 })
                            });
                        } catch (e) {
                            errEl.textContent = 'Нет связи с сервером';
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        const data = await res.json().catch(function () { return {}; });
                        if (res.status === 401) {
                            clearAuth();
                            showAuthScreen();
                            btn.disabled = false;
                            return;
                        }
                        if (!res.ok) {
                            let m = data.detail;
                            if (Array.isArray(m)) {
                                m = m.map(function (x) { return x.msg || JSON.stringify(x); }).join('; ');
                            }
                            if (typeof m === 'object' && m !== null) m = JSON.stringify(m);
                            if (typeof m !== 'string') m = 'Ошибка ' + res.status;
                            errEl.textContent = m;
                            errEl.style.display = 'block';
                            btn.disabled = false;
                            return;
                        }
                        document.getElementById('vwAccOldPwd').value = '';
                        document.getElementById('vwAccNewPwd').value = '';
                        document.getElementById('vwAccNewPwd2').value = '';
                        showAppAlert('Пароль обновлён.', 'Готово');
                    } catch (e) {
                        errEl.textContent = String(e.message || e);
                        errEl.style.display = 'block';
                    }
                    btn.disabled = false;
                };
            } catch (e) {
                el.innerHTML = '<p class="muted">' + esc(String(e.message || e)) + '</p>';
            }
        })();
    }

    function renderHomeTab() {
        const el = document.getElementById('tabContent');
        let html = '<h2 style="margin-top:0">Разделы</h2>';
        html += '<div class="hub-grid">';
        for (let i = 0; i < SECTION_TABS.length; i++) {
            const t = SECTION_TABS[i];
            html +=
                '<button type="button" class="hub-card" data-hub-tab="' +
                esc(t.id) +
                '"><span class="hub-card-ico">' +
                t.ico +
                '</span><span class="hub-card-title">' +
                esc(t.label) +
                '</span><span class="hub-card-hint">' +
                esc(tabTagline(t.id)) +
                '</span></button>';
        }
        html += '</div>';
        el.innerHTML = html;
        el.querySelectorAll('.hub-card[data-hub-tab]').forEach(function (btn) {
            btn.onclick = async function () {
                currentTab = btn.getAttribute('data-hub-tab');
                await renderShell();
            };
        });
    }

    function renderTabContent() {
        if (currentTab === 'home') return renderHomeTab();
        if (currentTab === 'account') return renderAccountTab();
        if (currentTab === 'profile') return renderProfileTab();
        if (currentTab === 'test') return renderTestTab();
        if (currentTab === 'analysis') return renderAnalysisTab();
        if (currentTab === 'chat') return renderChatTab();
        if (currentTab === 'jobs') return renderJobsTab();
        if (currentTab === 'simulator') return renderSimulatorTab();
    }

    window.__vw = {
        submitAuth: submitAuth,
        logout: logout,
        goTab: async function (id) {
            currentTab = id;
            await renderShell();
        },
    };

    (async function bootstrap() {
        const tok = localStorage.getItem(ACCESS_TOKEN_KEY);
        if (!userId || !tok) showAuthScreen();
        else await renderShell();
    })();
})();
</script>
</body>
</html>
