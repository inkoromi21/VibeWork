# VibeWork: nginx → uvicorn (miniapp/run.py) на 127.0.0.1:8000
# Скопируйте в /etc/nginx/sites-available/vibework и подключите в sites-enabled.
# После проверки HTTP: certbot --nginx -d vibeworkrussia.ru -d www.vibeworkrussia.ru
#
# Замените server_name, если другой домен.

upstream vibework_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name vibeworkrussia.ru www.vibeworkrussia.ru;

    client_max_body_size 20m;

    location / {
        proxy_pass http://vibework_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
